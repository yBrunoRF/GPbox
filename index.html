    <!-- Meta Pixel Code -->
    <script>
      const pixelId = "%VITE_META_PIXEL_ID%";
      if (pixelId && pixelId !== "%VITE_META_PIXEL_ID%" && pixelId !== "SEU_PIXEL_ID_AQUI") {
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
